<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0d0f14;
      --surface:   #161a22;
      --border:    #232838;
      --accent:    #5b8dee;
      --accent-dim:#1e2d4a;
      --text:      #e8ecf4;
      --muted:     #6b7591;
      --user-bg:   #1c2540;
      --bot-bg:    #161a22;
      --radius:    14px;
      --font:      'Inter', sans-serif;
      --mono:      'JetBrains Mono', monospace;
    }
    html, body {
      height: 100dvh; 
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      overflow: hidden;
    }
    .app { display: flex; flex-direction: column; height: 100%; max-width: 780px; margin: 0 auto; background: var(--bg); }
    header { display: flex; align-items: center; gap: 12px; padding: calc(12px + env(safe-area-inset-top)) 18px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
    .avatar {
      width: 36px; 
      height: 36px;
      border-radius: 50%;
      display: flex; 
      align-items: center; 
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .header-info h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #3ecf8e; animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .clear-btn { margin-left: auto; background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 8px; font-size: 12px; font-family: var(--font); cursor: pointer; transition: color .15s, border-color .15s; -webkit-tap-highlight-color: transparent; }
    .clear-btn:hover { color: var(--text); border-color: var(--muted); }
    .messages { flex: 1; overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center; padding: 40px 10px; margin: auto 0; }
    .welcome-icon {
      width: 64px; 
      height: 64px; 
      border-radius: 20px; 
      background: linear-gradient(135deg, #5b8dee22, #7b5ce722); 
      border: 1px solid #5b8dee44; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      flex-shrink: 0;
      overflow: hidden;
    }
    .welcome-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .welcome h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
    .welcome p { color: var(--muted); max-width: 340px; font-size: 14px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .suggestion-chip { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-family: var(--font); transition: border-color .15s, background .15s; -webkit-tap-highlight-color: transparent; }
    .suggestion-chip:hover { border-color: var(--accent); background: var(--accent-dim); }
    .bubble-row { display: flex; gap: 10px; align-items: flex-end; animation: fadeUp .2s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .bubble-row.user { flex-direction: row-reverse; }
    .bubble-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .bubble-row.assistant .bubble-avatar { background: linear-gradient(135deg, #5b8dee, #7b5ce7); }
    .bubble-row.user .bubble-avatar { background: var(--user-bg); border: 1px solid var(--border); }
    .bubble-wrapper { display: flex; flex-direction: column; min-width: 60px; max-width: 100%; }
    .bubble-row.user .bubble-wrapper { align-items: flex-end; }
    .bubble-row.assistant .bubble-wrapper { align-items: flex-start; }
    .bubble { width: fit-content; max-width: 80%; min-width: 45px; padding: 12px 16px; border-radius: var(--radius); font-size: 14.5px; line-height: 1.65; white-space: pre-wrap; word-break: normal; }
    .bubble-row.user .bubble { background: var(--user-bg); border: 1px solid #2a3660; border-bottom-right-radius: 4px; }
    .bubble-row.assistant .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bubble h3 { font-size: 16px; margin-top: 10px; margin-bottom: 6px; color: var(--accent); }
    .bubble h2 { font-size: 18px; margin-top: 14px; margin-bottom: 8px; color: var(--accent); }
    .bubble li { margin-left: 18px; margin-bottom: 4px; }
    .bubble code { font-family: var(--mono); font-size: 13px; background: #0d0f14; padding: 2px 6px; border-radius: 4px; color: #a8d8ff; }
    .bubble pre { background: #0d0f14; border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-x: auto; margin-top: 8px; }
    .bubble pre code { background: none; padding: 0; }
    .bubble-time { font-size: 11px; color: var(--muted); margin-top: 4px; padding: 0 2px; }
    .bubble-row.user .bubble-time { text-align: right; }
    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 12px 16px; background: var(--bot-bg); border: 1px solid var(--border); border-radius: var(--radius); border-bottom-left-radius: 4px; width: fit-content; }
    .typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce .9s ease-in-out infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: .15s; }
    .typing-indicator span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    .input-area { padding: 12px 18px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
    .input-box { display: flex; gap: 6px; align-items: flex-end; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; transition: border-color .15s; }
    .input-box:focus-within { border-color: var(--accent); }
    #userInput { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--font); font-size: 16px; resize: none; max-height: 120px; line-height: 1.55; padding: 6px 4px; }
    #userInput::placeholder { color: var(--muted); }
    .send-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s, transform .1s; -webkit-tap-highlight-color: transparent; }
    .send-btn:hover { background: #7ba8f5; }
    .send-btn:active { transform: scale(.94); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }
    .input-hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 6px; }
    .error-toast { background: #2d1a1a; border: 1px solid #5a2020; color: #ff8080; padding: 10px 14px; border-radius: 10px; font-size: 13px; text-align: center; }
    @media (max-width: 480px) { .bubble { max-width: 85%; } .welcome h2 { font-size: 20px; } .input-hint { display: none; } }
    .action-btn { background: none; border: none; color: var(--muted); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%; transition: color 0.15s, background-color 0.15s; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .action-btn:hover { color: var(--text); background-color: var(--border); }
    .action-btn.recording { color: #ff4d4d; background-color: rgba(255, 77, 77, 0.15); animation: micPulse 1.5s infinite ease-in-out; }
    @keyframes micPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="avatar">
        <img src="public/Alpha.png" alt="Avatar" />
    </div>
    <div class="header-info">
      <h1>Alpha</h1>
      <div class="status"><span class="status-dot"></span><span>Online</span></div>
    </div>
    <button class="clear-btn" onclick="clearChat()">Clear chat</button>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <img src="public/Alpha.png" alt="Welcome Avatar" />
      </div>
      <h2>How can I help you?</h2>
      <p>Ask me anything — I can write, explain, code, brainstorm, and more.</p>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Explain quantum computing</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Write a short poem</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Help me debug my code</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">What's the meaning of life?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(this)" />
      <button class="action-btn" onclick="document.getElementById('fileInput').click()" title="Upload file">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <textarea id="userInput" placeholder="Message AI Assistant…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="action-btn mic-btn" id="micBtn" onclick="toggleVoiceRecord()" title="Record voice">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </button>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 14L14 8L2 2V6.5L10 8L2 9.5V14Z" fill="white"/></svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · Shift+Enter for new line</p>
  </div>
</div>

<script>
  const ENDPOINT = '/api/chat'; 
  const IMAGE_SRC = 'public/Alpha.png';

  const SYSTEM_PROMPT = `You are an elite, highly intelligent, and versatile AI assistant. Your responses must strictly adhere to the following rules:
1. FORMATTING & MARKDOWN: Always use markdown. Wrap code blocks inside appropriate tags (e.g. \`\`\`html). Use bold terms (**text**) frequently to keep layouts scannable on mobile screens.
2. TONE: Be direct, concise, and professional. Avoid long introductions.
3. STRUCTURE: Break complex explanations into logical bullet points (* ) or distinct headings (###).`;

  let history = [];
  let isLoading = false;
  let attachedImageData = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let voiceRecordingActive = false;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');

  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }
  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  
  function sendSuggestion(btn) { 
    inputEl.value = btn.textContent; 
    sendMessage(); 
    inputEl.focus(); 
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <img src="${IMAGE_SRC}" alt="Welcome Avatar" />
        </div>
        <h2>How can I help you?</h2>
        <p>Ask me anything — I can write, explain, code, brainstorm, and more.</p>
      </div>
    `;
  }
  
  function timeNow() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

  function appendBubble(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    const isUser = role === 'user';
    const row = document.createElement('div');
    row.className = `bubble-row ${role}`;
    const avatarEl = document.createElement('div');
    avatarEl.className = 'bubble-avatar';
    avatarEl.textContent = isUser ? '👤' : '✦';
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrapper';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);
    const timeEl = document.createElement('div');
    timeEl.className = 'bubble-time';
    timeEl.textContent = timeNow();
    wrap.appendChild(bubble);
    wrap.appendChild(timeEl);
    row.appendChild(avatarEl);
    row.appendChild(wrap);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    const row = document.createElement('div');
    row.className = 'bubble-row assistant';
    row.id = 'typingRow';
    const avatarEl = document.createElement('div');
    avatarEl.className = 'bubble-avatar';
    avatarEl.textContent = '✦';
    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(avatarEl);
    row.appendChild(indicator);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function hideTyping() { const el = document.getElementById('typingRow'); if (el) el.remove(); }

  function formatText(text) {
    let t = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
    t = t.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
    t = t.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
    t = t.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');
    t = t.replace(/^\*\s+(.+)$/gm, '<li>$1</li>');
    t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
    t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
    t = t.replace(/\n/g, '<br>');
    t = t.replace(/(<li>.*?<\/li>)/g, '<ul style="margin: 4px 0; padding-left: 5px;">$1</ul>');
    return t;
  }

  function scrollToBottom() { requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }); }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text && !attachedImageData || isLoading) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    if (text) appendBubble('user', text);

    let messageParts = [];
    if (text) messageParts.push({ text: text });
    if (attachedImageData) messageParts.unshift(attachedImageData);

    history.push({ role: 'user', parts: messageParts });
    attachedImageData = null; 
    isLoading = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      const response = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: history,
          systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      hideTyping();
      appendBubble('assistant', reply);
      history.push({ role: 'model', parts: [{ text: reply }] });
    } catch (err) {
      hideTyping();
      const errEl = document.createElement('div');
      errEl.className = 'error-toast';
      errEl.textContent = `⚠ ${err.message || 'Something went wrong.'}`;
      messagesEl.appendChild(errEl);
      scrollToBottom();
      history.pop();
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  function handleFileSelect(input) {
    const file = input.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = function (e) {
      attachedImageData = { inlineData: { data: e.target.result.split(',')[1], mimeType: file.type } };
      appendImagePreview(e.target.result);
    };
    reader.readAsDataURL(file);
    input.value = '';
  }

  function appendImagePreview(imageSrc) {
    const welcome = document.getElementById('welcome'); if (welcome) welcome.remove();
    const row = document.createElement('div'); row.className = 'bubble-row user';
    const wrap = document.createElement('div'); wrap.className = 'bubble-wrapper';
    const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.style.padding = '8px';
    bubble.innerHTML = `<img src="${imageSrc}" style="max-width: 100%; max-height: 200px; border-radius: 8px; display: block;" />`;
    const timeEl = document.createElement('div'); timeEl.className = 'bubble-time'; timeEl.textContent = timeNow();
    wrap.appendChild(bubble); wrap.appendChild(timeEl); row.appendChild(wrap); messagesEl.appendChild(row); scrollToBottom();
  }

  async function toggleVoiceRecord() {
    const micBtn = document.getElementById('micBtn');
    if (!voiceRecordingActive) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) audioChunks.push(event.data); };
        mediaRecorder.onstop = () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
          appendVoiceNoteBubble(URL.createObjectURL(audioBlob));
          stream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        voiceRecordingActive = true;
        micBtn.classList.add('recording');
        inputEl.placeholder = "Recording voice note...";
      } catch (err) { alert("Microphone access denied."); }
    } else {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      voiceRecordingActive = false;
      micBtn.classList.remove('recording');
      inputEl.placeholder = "Message AI Assistant…";
    }
  }

  function appendVoiceNoteBubble(audioUrl) {
    const welcome = document.getElementById('welcome'); if (welcome) welcome.remove();
    const row = document.createElement('div'); row.className = 'bubble-row user';
    const wrap = document.createElement('div'); wrap.className = 'bubble-wrapper';
    const bubble = document.createElement('div'); bubble.className = 'bubble';
    bubble.innerHTML = `<audio src="${audioUrl}" controls style="max-width: 240px; display: block;"></audio>`;
    const timeEl = document.createElement('div'); timeEl.className = 'bubble-time'; timeEl.textContent = timeNow();
    wrap.appendChild(bubble); wrap.appendChild(timeEl); row.appendChild(wrap); messagesEl.appendChild(row); scrollToBottom();
  }
</script>
</body>
</html>
